<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobFill AI</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <div class="logo-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
          </svg>
        </div>
        <span class="logo-text">Job<span class="text-brand">Fill</span> AI</span>
      </div>
    </header>

    <!-- Not logged in -->
    <div id="notLoggedIn" class="state">
      <div class="icon-large">🔐</div>
      <h2>Sign in to auto-fill</h2>
      <p class="subtitle">Connect your JobFill AI account to start filling applications.</p>
      <div class="input-group">
        <label for="apiEmail">Email</label>
        <input type="email" id="apiEmail" placeholder="you@example.com" />
      </div>
      <div class="input-group">
        <label for="apiPassword">Password</label>
        <input type="password" id="apiPassword" placeholder="••••••••" />
      </div>
      <div id="loginError" class="error hidden"></div>
      <button id="loginBtn" class="btn-primary">
        <span>Sign In</span>
      </button>
      <p class="footer-text">
        Don't have an account? <a href="https://ai-jb.vercel.app/signup" target="_blank" class="link">Sign up</a>
      </p>
    </div>

    <!-- Logged in - Ready -->
    <div id="loggedIn" class="state hidden">
      <div id="profileSection" class="profile-section">
        <div class="profile-avatar" id="profileAvatar">?</div>
        <div class="profile-info">
          <span id="profileName">User</span>
          <span id="profileEmail" class="subtitle-small"></span>
        </div>
      </div>

      <!-- Profile selector -->
      <div class="input-group">
        <label for="profileSelect">Auto-fill Profile</label>
        <select id="profileSelect">
          <option value="">Loading profiles...</option>
        </select>
      </div>

      <!-- Detected form info -->
      <div id="formInfo" class="form-info">
        <div class="form-info-icon">📋</div>
        <div>
          <div class="form-info-title">Form Detection</div>
          <div id="formInfoText" class="subtitle-small">Click "Start" to analyze this page</div>
        </div>
      </div>

      <div id="actionError" class="error hidden"></div>
      <div id="reviewNotice" class="warning hidden"></div>

      <!-- Start button -->
      <button id="startBtn" class="btn-primary btn-start">
        <span class="btn-icon">⚡</span>
        <span>Start Auto-Fill</span>
      </button>

      <!-- Fill progress -->
      <div id="fillProgress" class="fill-progress hidden">
        <div class="progress-bar">
          <div id="progressFill" class="progress-fill"></div>
        </div>
        <div id="progressText" class="subtitle-small">Filling...</div>
      </div>

      <button id="logoutBtn" class="btn-ghost">Sign Out</button>
    </div>

    <!-- Loading state -->
    <div id="loading" class="state">
      <div class="spinner"></div>
      <p class="subtitle">Loading...</p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
