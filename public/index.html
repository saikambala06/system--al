<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in - SKVK Autofill</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card">
      <a href="index.html" class="brand">
        <span class="brand-mark">SK</span>
        SKVK Autofill
      </a>
      <h1>Log in</h1>
      <p class="auth-sub">Get back to your profile and Q&amp;A bank.</p>

      <form id="loginForm">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="email">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" required autocomplete="current-password">
        </div>
        <p class="error-text" id="error"></p>
        <button type="submit" class="btn btn-primary btn-block">Log in</button>
      </form>

      <p class="auth-switch">New here? <a href="register.html">Create an account</a></p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
